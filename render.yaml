services:
  - type: web
    name: bizgenie-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bizgenie-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-app.vercel.app

databases:
  - name: bizgenie-db
    databaseName: bizgenie
    user: bizgenie
    plan: free
